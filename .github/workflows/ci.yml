name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: app (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  api:
    name: api (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest -q

  build-images:
    name: build & push images
    needs: [app, api]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: build & push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY }}/finrag-app:${{ github.sha }}
      - name: build & push api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ secrets.REGISTRY }}/finrag-api:${{ github.sha }}
      - name: build & push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: ${{ secrets.REGISTRY }}/finrag-worker:${{ github.sha }}

  deploy:
    name: deploy (Dokploy)
    needs: build-images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: ssh deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export IMAGE_TAG=${{ github.sha }}
            cd /opt/fin-rag
            docker compose -f infra/docker-compose.yml --env-file infra/.env pull
            docker compose -f infra/docker-compose.yml --env-file infra/.env up -d
            docker compose -f infra/docker-compose.yml --env-file infra/.env exec -T api alembic upgrade head
